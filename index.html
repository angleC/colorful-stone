<!DOCTYPE html>
<html lang="en" xmlns:th=http://www.thymeleaf.org>

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width,initial-scale=0,maximum-scale=0,user-scalable=yes,shrink-to-fit=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <title>表单设计器</title>
    <link rel="stylesheet" href="./layui-v2.13.3/css/layui.css" />
    <link rel="stylesheet" href="./css/formdesigner.css" />
</head>

<body class="layui-layout-body">
    <div style="height: 100%; width: 100%;" id="formdesigner">

    </div>
    <script type="text/javascript" src="./layui-v2.13.3/layui.js"></script>
    <script type="text/javascript" src="./js/config.js"></script>
    <script type="text/javascript" src="./js/component.js"></script>
    <script type="text/javascript" src="./js/modules/Sortable/Sortable.js"> </script>
    <script>
        layui.config({ base: './js/modules/' }).use(['layer', 'formDesigner'], function () {
            var formDesigner = layui.formDesigner;
            var data = [];
            var render = formDesigner.render({
                data: data,
                elem: '#formdesigner'
            });
        }); 
    </script>

</body>

</html>
