<div class="components-title"> {{=d.label}} </div>
<div class="components-draggable" id="{{=d.id}}">
    {{# layui.each(d.controls, function(index,item) { if(item.visible === false){ return; } }}
    <ol data-key="{{=item.key}}" title="{{=item.key}}">
        <div class="icon">
            <i class="{{=item.icon}}"></i>
        </div>
        <div class="name">{{=item.name}}</div>
    </ol>
    {{# }); }}
</div>
